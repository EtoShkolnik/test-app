name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build APK with Buildozer Docker image
        run: |
          docker run --rm \
            --entrypoint bash \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            ghcr.io/kivy/buildozer:latest \
            -c '
              yes | buildozer android debug || true
              SDKMANAGER=$(find "$HOME/.buildozer" -name sdkmanager -type f | head -n 1)
              echo "Found sdkmanager at: $SDKMANAGER"
              yes | "$SDKMANAGER" --licenses
              yes | buildozer android debug
            '

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: totp-apk
          path: bin/*.apk
